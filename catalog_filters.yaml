# Catalog Filters for Dynamic Model Catalog Selection (§4.5.4)
#
# Operator-level overrides for the model catalog. Even with the full
# catalog open, operators need controls for provider reliability,
# privacy concerns, terms of service, or cost controls.
version: 1
# Models or providers NEVER to use, regardless of profile match
blocklist:
  providers: []
  models:
    # Removed from pool — qwen2.5:1.5b routing catastrophe (punch list #1)
    - "ollama/qwen2.5:1.5b"
    - "openrouter/openai/gpt-4o-mini-search-preview"
    - "openrouter/openai/gpt-4o-search-preview"
    # Safety classifiers - these ARE the guardrail, not a model
    - "openrouter/meta-llama/llama-guard-2-8b"
    - "openrouter/meta-llama/llama-guard-3-8b"
    - "openrouter/meta-llama/llama-guard-4-12b"
    - "openrouter/openai/gpt-oss-safeguard-20b"
    # Search/research-optimized - wrong tool for Syl
    - "openrouter/relace/relace-search"
    - "openrouter/perplexity/sonar-pro-search"
    - "openrouter/perplexity/sonar-deep-research"
    - "openrouter/openai/o3-deep-research"
    - "openrouter/openai/o4-mini-deep-research"
    - "openrouter/alibaba/tongyi-deepresearch-30b-a3b"
# If non-empty, ONLY these providers are eligible (overrides blocklist)
allowlist:
  providers:
    - "openrouter"
    - "venice"
    - "huggingface"  # Added 2026-04-19 — broaden pool when OR+Venice both hit rate limits
hard_ceiling:
  max_cost_per_1m_input_tokens: 20.00
  max_cost_per_1m_output_tokens: 60.00
